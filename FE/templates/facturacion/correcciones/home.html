{% extends "base.html" %}
{% block title %}Correcciones DTE · FE{% endblock %}
{% block content %}

<nav aria-label="breadcrumb" class="mb-3">
  <ol class="breadcrumb">
    <li class="breadcrumb-item"><a href="{% url 'ventas_home' %}">Facturación</a></li>
    <li class="breadcrumb-item active" aria-current="page">Correcciones</li>
  </ol>
</nav>

{% if messages %}
  {% for m in messages %}
    <div class="alert alert-{{ m.tags }} alert-dismissible py-2" role="alert">
      {{ m }}<button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Cerrar"></button>
    </div>
  {% endfor %}
{% endif %}

<div class="d-flex justify-content-between align-items-center mb-3">
  <h1 class="h4 mb-0">Generar correcciones</h1>
</div>

<div class="row g-3">
  <div class="col-sm-6 col-lg-4">
    <a class="card h-100 text-decoration-none border-0 shadow-sm" href="{% url 'generar_ajuste_factura' %}?tipo_documento_dte=05">
      <div class="card-body d-flex align-items-center">
        <i class="bi bi-arrow-counterclockwise fs-1 me-3 text-warning"></i>
        <div>
          <div class="fw-semibold">Nota de Crédito</div>
          <div class="text-muted small">DTE 05</div>
        </div>
      </div>
    </a>
  </div>

  <div class="col-sm-6 col-lg-4">
    <a class="card h-100 text-decoration-none border-0 shadow-sm" href="{% url 'generar_ajuste_factura' %}?tipo_documento_dte=06">
      <div class="card-body d-flex align-items-center">
        <i class="bi bi-arrow-clockwise fs-1 me-3 text-danger"></i>
        <div>
          <div class="fw-semibold">Nota de Débito</div>
          <div class="text-muted small">DTE 06</div>
        </div>
      </div>
    </a>
  </div>
</div>

{% endblock %}
