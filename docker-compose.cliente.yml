# ─────────────────────────────────────────────────────────────
# INTRACOE V3 — App por cliente
#
# Requiere infraestructura corriendo:
#   docker compose up -d db firmador
#
# Levantar cliente:
#   APP_PORT=8001 DB_NAME=intracoe_cliente1 \
#     docker compose -f docker-compose.cliente.yml -p cliente1 up -d --build
# ─────────────────────────────────────────────────────────────

services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:${APP_PORT:-8000}"
    environment:
      - APP_PORT=${APP_PORT:-8000}
      - DB_HOST=intracioe_v3-db-1
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-intracoe}
      - DB_USER=${PG_USER:-intracoe}
      - DB_PASSWORD=${PG_PASSWORD:-intracoe2025}
      - FIRMADOR_URL=http://intracioe_v3-firmador-1:8113
    volumes:
      - media:/app/media
      - logs:/app/logs
      - intracioe_v3_certs:/app/FE/cert
    networks:
      - intracioe_v3_default

volumes:
  media:
  logs:
  intracioe_v3_certs:
    external: true

networks:
  intracioe_v3_default:
    external: true
