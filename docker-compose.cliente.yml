# ─────────────────────────────────────────────────────────────
# INTRACOE V3 — App por cliente
#
# Usa la infraestructura compartida (db + firmador) del
# docker-compose.yml principal.
#
# Levantar un cliente:
#   APP_PORT=8001 DB_NAME=intracoe_cliente1 \
#     docker compose -f docker-compose.cliente.yml -p cliente1 up -d --build
#
# Otro cliente:
#   APP_PORT=8002 DB_NAME=intracoe_cliente2 \
#     docker compose -f docker-compose.cliente.yml -p cliente2 up -d --build
# ─────────────────────────────────────────────────────────────

services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:${APP_PORT:-8000}"
    environment:
      - APP_PORT=${APP_PORT:-8000}
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-intracoe}
      - DB_USER=${PG_USER:-intracoe}
      - DB_PASSWORD=${PG_PASSWORD:-intracoe2025}
      - FIRMADOR_URL=http://firmador:8113
    volumes:
      - ${DB_NAME:-intracoe}_media:/app/media
      - ${DB_NAME:-intracoe}_logs:/app/logs
      - intracoe_v3_certs:/app/FE/cert
    networks:
      - intracoe_v3_default

networks:
  intracoe_v3_default:
    external: true
