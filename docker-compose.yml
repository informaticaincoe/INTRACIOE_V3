# ─────────────────────────────────────────────────────────────
# INTRACOE V3 — Docker Compose
#
# Configurar en .env:
#   APP_PORT=8001
#   PG_DB=intracoe_cliente1
#   PG_USER=intracoe
#   PG_PASSWORD=ClaveSegura123
#
# Levantar:
#   docker compose -p cliente1 up -d --build
# ─────────────────────────────────────────────────────────────

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${PG_DB:-intracoe}
      POSTGRES_USER: ${PG_USER:-intracoe}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-intracoe2025}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-intracoe}"]
      interval: 5s
      timeout: 3s
      retries: 10

  firmador:
    image: svfe/svfe-api-firmador:v20230109
    restart: unless-stopped
    ports:
      - "${FIRMADOR_PORT:-8113}:8113"
    volumes:
      - certs:/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8113/ || exit 0"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s

  app:
    build: .
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:${APP_PORT:-8000}"
    environment:
      - APP_PORT=${APP_PORT:-8000}
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${PG_DB:-intracoe}
      - DB_USER=${PG_USER:-intracoe}
      - DB_PASSWORD=${PG_PASSWORD:-intracoe2025}
      - FIRMADOR_URL=http://firmador:8113
    volumes:
      - app_media:/app/media
      - app_logs:/app/logs
      - certs:/app/FE/cert
    depends_on:
      db:
        condition: service_healthy
      firmador:
        condition: service_healthy

volumes:
  pgdata:
  app_media:
  app_logs:
  certs:
