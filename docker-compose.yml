version: "3.9"

# ─────────────────────────────────────────────────────────────
# INTRACOE V3 — Docker Compose
#
# Cada cliente en su propio contenedor con puerto único:
#   APP_PORT=8001 docker-compose -p cliente1 up -d
#   APP_PORT=8002 docker-compose -p cliente2 up -d
# ─────────────────────────────────────────────────────────────

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${PG_DB:-intracoe}
      POSTGRES_USER: ${PG_USER:-intracoe}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-intracoe2025}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-intracoe}"]
      interval: 5s
      timeout: 3s
      retries: 10

  firmador:
    image: svfe/svfe-api-firmador:v20230109
    restart: unless-stopped
    ports:
      - "${FIRMADOR_PORT:-8113}:8113"
    volumes:
      - certs:/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8113/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 40s

  app:
    build: .
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:${APP_PORT:-8000}"
    environment:
      - APP_PORT=${APP_PORT:-8000}
      - FIRMADOR_URL=http://firmador:8113
    volumes:
      - app_media:/app/media
      - app_logs:/app/logs
      - certs:/app/FE/cert
    depends_on:
      db:
        condition: service_healthy
      firmador:
        condition: service_healthy

volumes:
  pgdata:
  app_media:
  app_logs:
  certs:
