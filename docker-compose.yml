# ─────────────────────────────────────────────────────────────
# INTRACOE V3 — Infraestructura + App
#
# Paso 1: Levantar infraestructura (una sola vez):
#   docker compose up -d db firmador
#
# Paso 2: Levantar clientes (uno por cada):
#   docker compose run -d --name cliente1 -p 8001:8001 \
#     -e APP_PORT=8001 -e DB_NAME=intracoe_cliente1 app
#
#   docker compose run -d --name cliente2 -p 8002:8002 \
#     -e APP_PORT=8002 -e DB_NAME=intracoe_cliente2 app
# ─────────────────────────────────────────────────────────────

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${PG_USER:-intracoe}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-intracoe2025}
      POSTGRES_DB: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-intracoe}"]
      interval: 5s
      timeout: 3s
      retries: 10

  firmador:
    image: svfe/svfe-api-firmador:v20230109
    restart: unless-stopped
    ports:
      - "8113:8113"
    volumes:
      - certs:/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8113/ || exit 0"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s

  app:
    build: .
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:${APP_PORT:-8000}"
    environment:
      - APP_PORT=${APP_PORT:-8000}
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-intracoe}
      - DB_USER=${PG_USER:-intracoe}
      - DB_PASSWORD=${PG_PASSWORD:-intracoe2025}
      - FIRMADOR_URL=http://firmador:8113
    volumes:
      - certs:/app/FE/cert
    depends_on:
      db:
        condition: service_healthy
      firmador:
        condition: service_healthy

volumes:
  pgdata:
  certs:
