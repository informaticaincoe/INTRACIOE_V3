{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Error del servidor · INTRACOE</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body{background:#f0f4ff;min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:'Segoe UI',system-ui,sans-serif;}
    .error-card{text-align:center;max-width:480px;width:100%;padding:3rem 2rem;}
    .error-code{font-size:8rem;font-weight:800;line-height:1;background:linear-gradient(135deg,#dc2626,#ef4444,#f97316);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .error-title{font-size:1.35rem;font-weight:700;color:#1e293b;margin:.75rem 0 .5rem;}
    .error-text{color:#64748b;font-size:.9rem;margin-bottom:2rem;line-height:1.6;}
    .btn-home{background:#0d47a1;color:#fff;border:0;padding:.6rem 2rem;border-radius:2rem;font-weight:600;font-size:.9rem;transition:all .2s;text-decoration:none;}
    .btn-home:hover{background:#1565c0;color:#fff;transform:translateY(-1px);box-shadow:0 4px 12px rgba(13,71,161,.3);}
    .brand{margin-top:2.5rem;font-size:.8rem;color:#cbd5e1;font-weight:600;}
    .brand span{color:#ff7a00;}
  </style>
</head>
<body>
  <div class="error-card">
    <div class="error-code">500</div>
    <div style="font-size:3rem;color:#94a3b8;margin-bottom:1rem;"><i class="bi bi-exclamation-triangle"></i></div>
    <div class="error-title">Error interno del servidor</div>
    <div class="error-text">
      Ocurrió un problema inesperado. El equipo técnico ha sido notificado.<br>
      Intenta de nuevo en unos momentos.
    </div>
    <a href="/" class="btn-home"><i class="bi bi-house me-1"></i> Ir al inicio</a>
    <div class="brand">Intra<span>coe</span> v3</div>
  </div>
</body>
</html>
