{% with uid_prefix=uid|default:"ped" %}

<button id="{{ uid_prefix }}-btn-home" type="button" class="sb-module-home">
  <i class="bi bi-house-door-fill"></i> Inicio Config.
</button>

<button id="{{ uid_prefix }}-btn-categorias" type="button" class="sb-sub-item">
  <i class="bi bi-tag"></i> Categorías menú
</button>

<button id="{{ uid_prefix }}-btn-menu" type="button" class="sb-sub-item">
  <i class="bi bi-egg-fried"></i> Menú
</button>

<button id="{{ uid_prefix }}-btn-areas" type="button" class="sb-sub-item">
  <i class="bi bi-diagram-3"></i> Áreas
</button>

<script>
document.addEventListener('DOMContentLoaded', function () {
  const b = "{{ uid_prefix }}";
  const go = (id, url) => document.getElementById(b + id)?.addEventListener('click', () => { window.location.href = url; });
  go('-btn-home',       "{% url 'categorias-menu' %}");
  go('-btn-categorias', "{% url 'categorias-menu' %}");
  go('-btn-menu',       "{% url 'menu' %}");
  go('-btn-areas',      "{% url 'areas' %}");
});
</script>

{% endwith %}
