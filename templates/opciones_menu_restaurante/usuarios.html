{% with uid_prefix=uid|default:"us" %}

{% if user.role == 'admin' %}
<button id="{{ uid_prefix }}-btn-home" type="button" class="sb-module-home">
  <i class="bi bi-house-door-fill"></i> Inicio Usuarios
</button>

<button id="{{ uid_prefix }}-btn-permisos" type="button" class="sb-sub-item">
  <i class="bi bi-shield-check"></i> Permisos
</button>
<button id="{{ uid_prefix }}-btn-grupos" type="button" class="sb-sub-item">
  <i class="bi bi-people-fill"></i> Grupos
</button>
<button id="{{ uid_prefix }}-btn-usuarios" type="button" class="sb-sub-item">
  <i class="bi bi-person-gear"></i> Usuarios
</button>
{% endif %}

<script>
document.addEventListener('DOMContentLoaded', function () {
  const b = "{{ uid_prefix }}";
  const go = (id, url) => document.getElementById(b + id)?.addEventListener('click', () => { window.location.href = url; });
  go('-btn-home',     "{% url 'usuarios_list' %}");
  go('-btn-permisos', "{% url 'permisos_list' %}");
  go('-btn-grupos',   "{% url 'permisos_goup_list' %}");
  go('-btn-usuarios', "{% url 'usuarios_list' %}");
});
</script>

{% endwith %}
