{% with uid_prefix=uid|default:"ven" %}

{# Inicio del módulo #}
<button id="{{ uid_prefix }}-btn-home" type="button" class="sb-module-home">
  <i class="bi bi-house-door-fill"></i> Inicio Ventas
</button>

<button id="{{ uid_prefix }}-btn-clientes" type="button" class="sb-sub-item">
  <i class="bi bi-people"></i> Clientes
</button>

<button id="{{ uid_prefix }}-btn-ventas" type="button" class="sb-sub-item">
  <i class="bi bi-cart-check"></i> Ventas
</button>

<button id="{{ uid_prefix }}-btn-catalogo" type="button" class="sb-sub-item">
  <i class="bi bi-journal-bookmark-fill"></i> Catálogo
</button>

{% if user.is_staff %}
<button id="{{ uid_prefix }}-btn-devoluciones" type="button" class="sb-sub-item">
  <i class="bi bi-arrow-return-left"></i> Devoluciones
</button>
<button id="{{ uid_prefix }}-btn-reportes" type="button" class="sb-sub-item">
  <i class="bi bi-clipboard-data"></i> Reportes
</button>
{% endif %}

<script>
document.addEventListener('DOMContentLoaded', function () {
  const b = "{{ uid_prefix }}";
  const catalogoURL = "{% url 'catalogo_productos' %}{% if receptor_id %}?receptor_id={{ receptor_id }}{% endif %}";
  const go = (id, url) => document.getElementById(b + id)?.addEventListener('click', () => { window.location.href = url; });
  go('-btn-home',        "{% url 'ventas_home' %}");
  go('-btn-clientes',    "{% url 'clientes_list' %}");
  go('-btn-ventas',      "{% url 'ventas_home' %}");
  go('-btn-catalogo',    catalogoURL);
  go('-btn-devoluciones',"{% url 'devoluciones_list' %}");
  go('-btn-reportes',    "{% url 'ventas_list' %}#reportes");
});
</script>

{% endwith %}
