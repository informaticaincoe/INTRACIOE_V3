{% with uid_prefix=uid|default:"fac" %}

{# Inicio del módulo #}
<button id="{{ uid_prefix }}-btn-home" type="button" class="sb-module-home">
  <i class="bi bi-house-door-fill"></i> Inicio Facturación
</button>

<button id="{{ uid_prefix }}-btn-generar" type="button" class="sb-sub-item">
  <i class="bi bi-file-earmark-plus"></i> Generar Facturas
</button>

{% if user.is_staff %}
<button id="{{ uid_prefix }}-btn-corr" type="button" class="sb-sub-item">
  <i class="bi bi-pencil-square"></i> Generar Correcciones
</button>
{% endif %}

<button id="{{ uid_prefix }}-btn-listar" type="button" class="sb-sub-item">
  <i class="bi bi-journal-text"></i> Listado de Facturas
</button>

{% if user.is_staff %}
<button id="{{ uid_prefix }}-btn-suj-exc" type="button" class="sb-sub-item">
  <i class="bi bi-person-x"></i> Sujeto Excluido
</button>
<button id="{{ uid_prefix }}-btn-conting" type="button" class="sb-sub-item">
  <i class="bi bi-exclamation-triangle"></i> Contingencias
</button>
<button id="{{ uid_prefix }}-btn-mes" type="button" class="sb-sub-item">
  <i class="bi bi-calendar-check"></i> Consolidar del mes
</button>
{% endif %}

<script>
document.addEventListener('DOMContentLoaded', function () {
  const b = "{{ uid_prefix }}";
  const go = (id, url) => document.getElementById(b + id)?.addEventListener('click', () => { window.location.href = url; });
  go('-btn-home',    "{% url 'facturacion_generar_home' %}");
  go('-btn-generar', "{% url 'facturacion_generar_home' %}");
  go('-btn-corr',    "{% url 'facturacion_correcciones_home' %}");
  go('-btn-listar',  "{% url 'listar_facturas' %}");
  go('-btn-suj-exc', "{% url 'listar_facturas' %}?tipo_dte=14");
  go('-btn-conting', "{% url 'listar_contingencias' %}");
  go('-btn-mes',     "{% url 'select_tipo_facturas_mes_home' %}");
});
</script>

{% endwith %}
