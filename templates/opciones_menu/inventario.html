{% with uid_prefix=uid|default:"inv" %}

{# Inicio del módulo #}
<button id="{{ uid_prefix }}-btn-home" type="button" class="sb-module-home">
  <i class="bi bi-house-door-fill"></i> Inicio Inventario
</button>

{% if user.is_staff %}
<button id="{{ uid_prefix }}-btn-gestion" type="button" class="sb-sub-item">
  <i class="bi bi-arrow-left-right"></i> Gestión
</button>
<button id="{{ uid_prefix }}-btn-ajuste" type="button" class="sb-sub-item">
  <i class="bi bi-sliders"></i> Ajuste de Inventario
</button>
{% endif %}

<button id="{{ uid_prefix }}-btn-prod" type="button" class="sb-sub-item">
  <i class="bi bi-box-seam"></i> Productos
</button>

<button id="{{ uid_prefix }}-btn-serv" type="button" class="sb-sub-item">
  <i class="bi bi-tools"></i> Servicios
</button>

<script>
document.addEventListener('DOMContentLoaded', function () {
  const b = "{{ uid_prefix }}";
  const go = (id, url) => document.getElementById(b + id)?.addEventListener('click', () => { window.location.href = url; });
  go('-btn-home',    "{% url 'inv-home' %}");
  go('-btn-gestion', "{% url 'inv-home' %}");
  go('-btn-ajuste',  "{% url 'inv-movs-lista' %}?tipo=Ajuste");
  go('-btn-prod',    "{% url 'inv-productos-lista' %}");
  go('-btn-serv',    "{% url 'inv-productos-lista' %}?q=servicio");
});
</script>

{% endwith %}
