{% with uid_prefix=uid|default:"cmp" %}

{# Inicio del módulo #}
<button id="{{ uid_prefix }}-btn-home" type="button" class="sb-module-home">
  <i class="bi bi-house-door-fill"></i> Inicio Compras
</button>

{% if user.is_staff %}
<button id="{{ uid_prefix }}-btn-compras" type="button" class="sb-sub-item">
  <i class="bi bi-calculator"></i> Compras
</button>
{% endif %}

<button id="{{ uid_prefix }}-btn-proveedores" type="button" class="sb-sub-item">
  <i class="bi bi-people"></i> Proveedores
</button>

{% if user.is_staff %}
<button id="{{ uid_prefix }}-btn-reporte" type="button" class="sb-sub-item">
  <i class="bi bi-bar-chart-line"></i> Reporte
</button>
{% endif %}

<script>
document.addEventListener('DOMContentLoaded', function () {
  const b = "{{ uid_prefix }}";
  const go = (id, url) => document.getElementById(b + id)?.addEventListener('click', () => { window.location.href = url; });
  go('-btn-home',       "{% url 'compras-lista' %}");
  go('-btn-compras',    "{% url 'compras-lista' %}");
  go('-btn-proveedores',"{% url 'proveedores-lista' %}");
  go('-btn-reporte',    "#");
});
</script>

{% endwith %}
