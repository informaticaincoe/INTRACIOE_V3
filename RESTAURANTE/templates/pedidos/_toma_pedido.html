<div class="modal fade" id="tomarOrdenModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered modal-xl">
    <div class="modal-content border-0 shadow">

      <div class="modal-header border-bottom py-3 px-4">
        <div class="d-flex align-items-center gap-3">
          <div class="rounded-circle bg-primary bg-opacity-10 d-flex align-items-center justify-content-center"
               style="width:2.4rem;height:2.4rem">
            <i class="bi bi-clipboard2-plus text-primary"></i>
          </div>
          <div>
            <h5 class="modal-title fw-semibold mb-0">
              Tomar orden · Mesa <span id="to_mesa_numero"></span>
            </h5>
            <small class="text-muted" id="to_pedido_hint">Selecciona los platillos para agregar a la orden</small>
          </div>
        </div>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <form id="tomarOrdenForm" method="post" action="{% url 'pedido_crear_desde_mesa' %}">
        {% csrf_token %}
        <input type="hidden" name="mesa_id" id="to_mesa_id">

        <div class="modal-body p-4" style="max-height:75vh; overflow-y:auto;">
          <div id="tomarOrdenBody">
            <div class="d-flex align-items-center justify-content-center py-5 text-muted gap-2">
              <div class="spinner-border spinner-border-sm opacity-50"></div>
              <span>Cargando menú…</span>
            </div>
          </div>
        </div>

        <div class="modal-footer border-top px-4 py-3 gap-2">
          <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">
            Cancelar
          </button>
          <button type="submit" class="btn btn-primary px-4" disabled id="btn-enviar-orden">
            <i class="bi bi-send me-2"></i>Enviar a cocina
          </button>
        </div>
      </form>

    </div>
  </div>
</div>

<script src="https://unpkg.com/htmx.org@1.9.12"></script>
<script>
  document.addEventListener("shown.bs.modal", (ev) => {
    if (ev.target.id !== "tomarOrdenModal") return;

    // Resetear selección al abrir el modal
    window.__tomarOrdenSelected = [];

    const trigger = ev.relatedTarget;
    if (!trigger) return;

    const mesaId     = trigger.getAttribute("data-mesa-id");
    const mesaNumero = trigger.getAttribute("data-mesa-numero");

    document.getElementById("to_mesa_id").value    = mesaId     || "";
    document.getElementById("to_mesa_numero").textContent = mesaNumero || "";

    const url = "{% url 'tomar_pedido' 0 %}".replace("/0/", `/${mesaId}/`);
    htmx.ajax("GET", url, { target: "#tomarOrdenBody", swap: "innerHTML" });
  });

  // Deshabilitar scroll del modal cuando se hace scroll en el body del modal
  document.getElementById("tomarOrdenModal").addEventListener("wheel", (e) => {
    e.stopPropagation();
  });
</script>
