{% extends "base.html" %}
{% block title %}Confirmar eliminación · Inventario{% endblock %}
{% block content %}

<div class="row justify-content-center mt-4">
  <div class="col-md-5">
    <div class="card border-danger border-0 shadow-sm">
      <div class="card-body text-center py-5">
        <div class="mb-3">
          <i class="bi bi-exclamation-triangle-fill text-danger" style="font-size:3rem;"></i>
        </div>
        <h1 class="h5 mb-2">¿Eliminar este registro?</h1>
        <p class="text-muted mb-4">Esta acción es permanente y no se puede deshacer.</p>
        <form method="post" class="d-flex gap-2 justify-content-center">
          {% csrf_token %}
          <a href="{% url back_url %}" class="btn btn-secondary">
            <i class="bi bi-arrow-left me-1"></i>Cancelar
          </a>
          <button class="btn btn-danger">
            <i class="bi bi-trash me-1"></i>Eliminar definitivamente
          </button>
        </form>
      </div>
    </div>
  </div>
</div>

{% endblock %}
