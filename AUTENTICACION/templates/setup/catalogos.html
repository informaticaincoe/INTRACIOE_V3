{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Paso 3: Catálogos · INTRACOE</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body{background:#f0f4ff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;}
    .setup-card{max-width:680px;width:100%;border:0;border-radius:1rem;box-shadow:0 8px 32px rgba(0,0,0,.1);overflow:hidden;}
    .setup-header{background:linear-gradient(135deg,#0d47a1,#1565c0);color:#fff;padding:1.75rem 2rem;text-align:center;}
    .setup-header h1{font-size:1.4rem;font-weight:700;margin:0;}
    .setup-header p{opacity:.85;margin:.4rem 0 0;font-size:.85rem;}
    .setup-header .icon{font-size:2.25rem;margin-bottom:.4rem;display:block;}
    .step-badges{display:flex;justify-content:center;gap:.4rem;margin-top:.75rem;}
    .step-badge{width:30px;height:30px;border-radius:50%;font-size:.72rem;font-weight:700;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.2);color:rgba(255,255,255,.55);}
    .step-badge.done{background:rgba(255,255,255,.35);color:#fff;}
    .step-badge.active{background:#fff;color:#0d47a1;}
    .form-body{padding:1.75rem 2rem 2rem;max-height:75vh;overflow-y:auto;}

    .cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;}
    @media(max-width:576px){.cat-grid{grid-template-columns:1fr;}}
    .cat-item{
      display:flex;align-items:center;gap:.6rem;
      padding:.55rem .75rem;border-radius:.5rem;
      border:1px solid #e2e8f0;background:#fff;
      font-size:.82rem;transition:all .2s;
    }
    .cat-item .cat-icon{
      width:32px;height:32px;border-radius:.4rem;
      display:flex;align-items:center;justify-content:center;
      font-size:.9rem;flex-shrink:0;
      background:#f1f5f9;color:#64748b;
    }
    .cat-item .cat-name{flex:1;font-weight:600;color:#334155;}
    .cat-item .cat-count{
      font-size:.72rem;font-weight:700;
      padding:.15rem .5rem;border-radius:1rem;
    }
    .cat-item.empty .cat-count{background:#fef2f2;color:#dc2626;}
    .cat-item.loaded .cat-count{background:#dcfce7;color:#16a34a;}
    .cat-item.loaded .cat-icon{background:#dcfce7;color:#16a34a;}
    .cat-item.loading{opacity:.6;}

    .status-box{
      display:none;padding:.75rem 1rem;border-radius:.5rem;
      font-size:.85rem;margin-bottom:1rem;
    }
    .status-box.success{display:block;background:#dcfce7;color:#166534;border:1px solid #bbf7d0;}
    .status-box.error{display:block;background:#fef2f2;color:#991b1b;border:1px solid #fecaca;}
    .status-box.info{display:block;background:#dbeafe;color:#1e40af;border:1px solid #bfdbfe;}

    .progress-bar-custom{height:6px;border-radius:3px;background:#e2e8f0;overflow:hidden;margin:1rem 0;}
    .progress-bar-custom .fill{height:100%;background:linear-gradient(90deg,#2563eb,#16a34a);border-radius:3px;transition:width .5s;}

    .spinner-sm{width:16px;height:16px;border-width:2px;}
  </style>
</head>
<body>
<div class="card setup-card">
  <div class="setup-header">
    <span class="icon"><i class="bi bi-database-down"></i></span>
    <h1>Intra<span style="color:#ff7a00;">coe</span> — Catálogos de Hacienda</h1>
    <p>Paso 3 de 6 · Cargue los catálogos oficiales del Ministerio de Hacienda</p>
    <div class="step-badges">
      <div class="step-badge done"><i class="bi bi-check"></i></div>
      <div class="step-badge done"><i class="bi bi-check"></i></div>
      <div class="step-badge active">3</div>
      <div class="step-badge">4</div>
      <div class="step-badge">5</div>
      <div class="step-badge">6</div>
    </div>
  </div>

  <div class="form-body">
    <div id="statusBox" class="status-box"></div>

    <div class="d-flex justify-content-between align-items-center mb-3">
      <div>
        <h6 class="mb-0 fw-bold"><i class="bi bi-list-check me-2"></i>Catálogos del sistema</h6>
        <small class="text-muted" id="summaryText">Verificando estado...</small>
      </div>
      <button type="button" class="btn btn-primary btn-sm" id="btnCargar" onclick="cargarCatalogos()" disabled>
        <i class="bi bi-download me-1"></i> Cargar todos
      </button>
    </div>

    <div class="progress-bar-custom" id="progressBar" style="display:none;">
      <div class="fill" id="progressFill" style="width:0%"></div>
    </div>

    <div class="cat-grid" id="catGrid">
      <div class="text-center text-muted py-4" style="grid-column:1/-1;">
        <span class="spinner-border spinner-sm me-2"></span>Cargando estado de catálogos...
      </div>
    </div>

    <div class="d-flex gap-2 mt-4">
      <button type="button" class="btn btn-outline-secondary flex-fill" id="btnRefresh" onclick="loadStatus()">
        <i class="bi bi-arrow-clockwise me-1"></i> Actualizar estado
      </button>
      <a href="/setup/?step=empresa" class="btn btn-primary flex-fill" id="btnContinuar" style="display:none;">
        Continuar <i class="bi bi-arrow-right ms-1"></i>
      </a>
    </div>
  </div>
</div>

<script>
const csrf = '{% csrf_token %}'.match(/value="([^"]+)"/)?.[1] || '';

function showStatus(type, msg){
  const box = document.getElementById('statusBox');
  box.className = 'status-box ' + type;
  box.innerHTML = msg;
}

async function loadStatus(){
  const grid = document.getElementById('catGrid');
  try {
    const body = new URLSearchParams({action:'status', csrfmiddlewaretoken: csrf});
    const res = await fetch('/setup/?step=catalogos', {method:'POST', body});
    const data = await res.json();

    if(!data.ok) return;

    let loaded = 0, total = data.catalogs.length;
    grid.innerHTML = '';

    data.catalogs.forEach(cat => {
      const isEmpty = cat.count === 0;
      if(!isEmpty) loaded++;
      const div = document.createElement('div');
      div.className = 'cat-item ' + (isEmpty ? 'empty' : 'loaded');
      div.innerHTML = `
        <div class="cat-icon"><i class="bi bi-${cat.icon}"></i></div>
        <div class="cat-name">${cat.name}</div>
        <div class="cat-count">${isEmpty ? 'Vacío' : cat.count}</div>
      `;
      grid.appendChild(div);
    });

    const summary = document.getElementById('summaryText');
    const btnCargar = document.getElementById('btnCargar');
    const btnCont = document.getElementById('btnContinuar');

    if(loaded === total){
      summary.textContent = `✓ ${loaded}/${total} catálogos cargados`;
      summary.style.color = '#16a34a';
      btnCargar.style.display = 'none';
      btnCont.style.display = '';
    } else {
      summary.textContent = `${loaded}/${total} cargados · ${total - loaded} pendientes`;
      btnCargar.disabled = false;
      btnCont.style.display = loaded > 0 ? '' : 'none';
    }
  } catch(e){
    grid.innerHTML = '<div class="text-danger py-3" style="grid-column:1/-1">Error al verificar: ' + e.message + '</div>';
  }
}

async function cargarCatalogos(){
  const btn = document.getElementById('btnCargar');
  const progress = document.getElementById('progressBar');
  const fill = document.getElementById('progressFill');

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-border spinner-sm me-1"></span> Cargando catálogos...';
  progress.style.display = '';

  // Simular progreso mientras carga
  let pct = 0;
  const timer = setInterval(() => {
    pct = Math.min(pct + Math.random() * 15, 90);
    fill.style.width = pct + '%';
  }, 300);

  try {
    const body = new URLSearchParams({action:'cargar', csrfmiddlewaretoken: csrf});
    const res = await fetch('/setup/?step=catalogos', {method:'POST', body});
    const data = await res.json();

    clearInterval(timer);
    fill.style.width = '100%';

    if(data.ok){
      showStatus('success', '<i class="bi bi-check-circle me-1"></i>' + data.msg);
      // Recargar estado
      await loadStatus();
    } else {
      showStatus('error', '<i class="bi bi-x-circle me-1"></i>' + data.error);
      btn.disabled = false;
      btn.innerHTML = '<i class="bi bi-download me-1"></i> Reintentar';
    }
  } catch(e){
    clearInterval(timer);
    showStatus('error', '<i class="bi bi-x-circle me-1"></i>Error: ' + e.message);
    btn.disabled = false;
    btn.innerHTML = '<i class="bi bi-download me-1"></i> Reintentar';
  }
}

// Cargar estado al iniciar
document.addEventListener('DOMContentLoaded', loadStatus);
</script>
</body>
</html>
