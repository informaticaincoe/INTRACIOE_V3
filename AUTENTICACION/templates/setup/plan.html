{% extends "base.html" %}
{% block content %}
<div class="container py-5">
  <div class="card shadow-sm">
    <div class="card-body">
      <h4 class="mb-4">Configuración inicial – Paso 3: Plan y Suscripción</h4>
      <p class="text-muted mb-4">
        Defina el plan comercial que tendrá este cliente. Seleccione los módulos disponibles.
      </p>

      <form method="post">
        {% csrf_token %}

        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Nombre del Plan *</label>
            <input type="text" name="nombre_plan" class="form-control" placeholder="Ej: Básico, Profesional, Empresarial" required>
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label">Fecha de vencimiento</label>
            <input type="date" name="fecha_fin" class="form-control">
            <small class="text-muted">Dejar vacío para suscripción sin vencimiento.</small>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">Descripción</label>
          <textarea name="descripcion_plan" class="form-control" rows="2" placeholder="Descripción breve del plan..."></textarea>
        </div>

        <hr class="my-4">
        <h6 class="mb-3">Módulos incluidos en el plan</h6>

        <div class="row g-3">
          <div class="col-md-4">
            <div class="form-check form-switch">
              <input class="form-check-input" type="checkbox" name="tiene_facturacion" id="chk_fact" checked>
              <label class="form-check-label" for="chk_fact">
                <i class="bi bi-file-earmark-text me-1 text-primary"></i> Facturación Electrónica
              </label>
            </div>
          </div>
          <div class="col-md-4">
            <div class="form-check form-switch">
              <input class="form-check-input" type="checkbox" name="tiene_ventas" id="chk_ventas" checked>
              <label class="form-check-label" for="chk_ventas">
                <i class="bi bi-receipt-cutoff me-1 text-primary"></i> Ventas
              </label>
            </div>
          </div>
          <div class="col-md-4">
            <div class="form-check form-switch">
              <input class="form-check-input" type="checkbox" name="tiene_compras" id="chk_compras">
              <label class="form-check-label" for="chk_compras">
                <i class="bi bi-basket me-1 text-primary"></i> Compras
              </label>
            </div>
          </div>
          <div class="col-md-4">
            <div class="form-check form-switch">
              <input class="form-check-input" type="checkbox" name="tiene_inventario" id="chk_inv">
              <label class="form-check-label" for="chk_inv">
                <i class="bi bi-box-seam me-1 text-primary"></i> Inventario
              </label>
            </div>
          </div>
          <div class="col-md-4">
            <div class="form-check form-switch">
              <input class="form-check-input" type="checkbox" name="tiene_contabilidad" id="chk_cont">
              <label class="form-check-label" for="chk_cont">
                <i class="bi bi-calculator me-1 text-primary"></i> Contabilidad
              </label>
            </div>
          </div>
          <div class="col-md-4">
            <div class="form-check form-switch">
              <input class="form-check-input" type="checkbox" name="tiene_rrhh" id="chk_rrhh">
              <label class="form-check-label" for="chk_rrhh">
                <i class="bi bi-person-badge me-1 text-primary"></i> RRHH / Nómina
              </label>
            </div>
          </div>
          <div class="col-md-4">
            <div class="form-check form-switch">
              <input class="form-check-input" type="checkbox" name="tiene_restaurante" id="chk_rest">
              <label class="form-check-label" for="chk_rest">
                <i class="bi bi-cup-hot me-1 text-primary"></i> Restaurante / POS
              </label>
            </div>
          </div>
        </div>

        <hr class="my-4">
        <button type="submit" class="btn btn-primary">Guardar y continuar</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
