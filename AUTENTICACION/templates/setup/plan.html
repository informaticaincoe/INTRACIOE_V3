{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Paso 4: Plan · INTRACOE</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body{background:#f0f4ff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;}
    .setup-card{max-width:600px;width:100%;border:0;border-radius:1rem;box-shadow:0 8px 32px rgba(0,0,0,.1);overflow:hidden;}
    .setup-header{background:linear-gradient(135deg,#0d47a1,#1565c0);color:#fff;padding:1.75rem 2rem;text-align:center;}
    .setup-header h1{font-size:1.4rem;font-weight:700;margin:0;}
    .setup-header p{opacity:.85;margin:.4rem 0 0;font-size:.85rem;}
    .setup-header .icon{font-size:2.25rem;margin-bottom:.4rem;display:block;}
    .step-badges{display:flex;justify-content:center;gap:.4rem;margin-top:.75rem;}
    .step-badge{width:30px;height:30px;border-radius:50%;font-size:.72rem;font-weight:700;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.2);color:rgba(255,255,255,.55);}
    .step-badge.done{background:rgba(255,255,255,.35);color:#fff;}
    .step-badge.active{background:#fff;color:#0d47a1;}
    .form-body{padding:1.75rem 2rem 2rem;}
    .form-label{font-size:.8rem;font-weight:600;color:#475569;}
    .section-title{font-size:.9rem;font-weight:700;color:#1e293b;margin:1.25rem 0 .75rem;display:flex;align-items:center;gap:.5rem;}
    .alert{font-size:.85rem;}

    .module-card{
      border:1px solid #e2e8f0;border-radius:.75rem;padding:.85rem 1rem;
      display:flex;align-items:center;gap:.75rem;cursor:pointer;
      transition:all .15s;background:#fff;
    }
    .module-card:hover{border-color:#93c5fd;background:#eff6ff;}
    .module-card.checked{border-color:#2563eb;background:#dbeafe;}
    .module-card .mod-icon{
      width:40px;height:40px;border-radius:.5rem;display:flex;align-items:center;
      justify-content:center;font-size:1.1rem;flex-shrink:0;
    }
    .module-card .mod-name{font-weight:600;font-size:.85rem;color:#1e293b;}
    .module-card .form-check-input{margin-left:auto;width:1.15em;height:1.15em;}
  </style>
</head>
<body>
<div class="card setup-card">
  <div class="setup-header">
    <span class="icon"><i class="bi bi-box-seam"></i></span>
    <h1>Intra<span style="color:#ff7a00;">coe</span> — Plan y Suscripción</h1>
    <p>Paso 4 de 5 · Defina los módulos disponibles para este cliente</p>
    <div class="step-badges">
      <div class="step-badge done"><i class="bi bi-check"></i></div>
      <div class="step-badge done"><i class="bi bi-check"></i></div>
      <div class="step-badge done"><i class="bi bi-check"></i></div>
      <div class="step-badge active">4</div>
      <div class="step-badge">5</div>
    </div>
  </div>

  <div class="form-body">
    {% if messages %}
      {% for m in messages %}
        <div class="alert alert-{{ m.tags }} alert-dismissible py-2">
          {{ m }}<button type="button" class="btn-close btn-close-sm" data-bs-dismiss="alert"></button>
        </div>
      {% endfor %}
    {% endif %}

    <form method="post">
      {% csrf_token %}

      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Nombre del Plan *</label>
          <input type="text" name="nombre_plan" class="form-control" placeholder="Ej: Empresarial" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">Fecha de vencimiento</label>
          <input type="date" name="fecha_fin" class="form-control">
          <div class="form-text">Vacío = sin vencimiento</div>
        </div>
        <div class="col-12">
          <label class="form-label">Descripción</label>
          <input type="text" name="descripcion_plan" class="form-control" placeholder="Descripción breve del plan...">
        </div>
      </div>

      <div class="section-title"><i class="bi bi-grid-3x3-gap text-primary"></i> Módulos incluidos</div>

      <div class="row g-2">
        <div class="col-md-6">
          <label class="module-card checked" onclick="this.classList.toggle('checked')">
            <div class="mod-icon" style="background:#dbeafe;color:#2563eb;"><i class="bi bi-file-earmark-text"></i></div>
            <div class="mod-name">Facturación</div>
            <input class="form-check-input" type="checkbox" name="tiene_facturacion" checked>
          </label>
        </div>
        <div class="col-md-6">
          <label class="module-card checked" onclick="this.classList.toggle('checked')">
            <div class="mod-icon" style="background:#dcfce7;color:#16a34a;"><i class="bi bi-receipt-cutoff"></i></div>
            <div class="mod-name">Ventas</div>
            <input class="form-check-input" type="checkbox" name="tiene_ventas" checked>
          </label>
        </div>
        <div class="col-md-6">
          <label class="module-card" onclick="this.classList.toggle('checked')">
            <div class="mod-icon" style="background:#fef3c7;color:#d97706;"><i class="bi bi-basket"></i></div>
            <div class="mod-name">Compras</div>
            <input class="form-check-input" type="checkbox" name="tiene_compras">
          </label>
        </div>
        <div class="col-md-6">
          <label class="module-card" onclick="this.classList.toggle('checked')">
            <div class="mod-icon" style="background:#f3e8ff;color:#7c3aed;"><i class="bi bi-box-seam"></i></div>
            <div class="mod-name">Inventario</div>
            <input class="form-check-input" type="checkbox" name="tiene_inventario">
          </label>
        </div>
        <div class="col-md-6">
          <label class="module-card" onclick="this.classList.toggle('checked')">
            <div class="mod-icon" style="background:#e0f2fe;color:#0284c7;"><i class="bi bi-calculator"></i></div>
            <div class="mod-name">Contabilidad</div>
            <input class="form-check-input" type="checkbox" name="tiene_contabilidad">
          </label>
        </div>
        <div class="col-md-6">
          <label class="module-card" onclick="this.classList.toggle('checked')">
            <div class="mod-icon" style="background:#fce7f3;color:#db2777;"><i class="bi bi-person-badge"></i></div>
            <div class="mod-name">RRHH / Nómina</div>
            <input class="form-check-input" type="checkbox" name="tiene_rrhh">
          </label>
        </div>
        <div class="col-md-6">
          <label class="module-card" onclick="this.classList.toggle('checked')">
            <div class="mod-icon" style="background:#fef2f2;color:#dc2626;"><i class="bi bi-cup-hot"></i></div>
            <div class="mod-name">Restaurante / POS</div>
            <input class="form-check-input" type="checkbox" name="tiene_restaurante">
          </label>
        </div>
        <div class="col-md-6">
          <label class="module-card checked" style="pointer-events:none;opacity:.5;">
            <div class="mod-icon" style="background:#f1f5f9;color:#64748b;"><i class="bi bi-speedometer2"></i></div>
            <div class="mod-name">Dashboard</div>
            <input class="form-check-input" type="checkbox" checked disabled>
          </label>
        </div>
      </div>

      <button type="submit" class="btn btn-primary w-100 mt-4">
        Continuar <i class="bi bi-arrow-right ms-1"></i>
      </button>
    </form>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
