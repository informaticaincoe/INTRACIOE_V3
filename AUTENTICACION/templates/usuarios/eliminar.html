{% extends "base.html" %}
{% block title %}Eliminar usuario · INTRACOE{% endblock %}

{% block content %}
<div class="container-fluid mt-3">

  <div class="d-flex align-items-center gap-2 mb-4">
    <a href="{% url 'usuarios_list' %}" class="btn btn-sm btn-outline-secondary">
      <i class="bi bi-arrow-left"></i>
    </a>
    <h5 class="mb-0 fw-semibold">Eliminar usuario</h5>
  </div>

  <div class="row justify-content-start">
    <div class="col-12 col-md-6 col-lg-5">
      <div class="card shadow-sm border-0 border-danger border-opacity-25">
        <div class="card-body p-4">
          <div class="d-flex align-items-start gap-3 mb-4">
            <div class="rounded-circle bg-danger bg-opacity-10 d-flex align-items-center justify-content-center flex-shrink-0"
                 style="width:3rem;height:3rem">
              <i class="bi bi-exclamation-triangle-fill text-danger fs-5"></i>
            </div>
            <div>
              <h6 class="fw-semibold mb-1">¿Eliminar este usuario?</h6>
              <p class="text-muted mb-0">
                Estás a punto de eliminar a <strong>{{ usuario.username }}</strong>.
                Esta acción no se puede deshacer.
              </p>
            </div>
          </div>

          <form method="post">
            {% csrf_token %}
            <div class="d-flex gap-2">
              <a href="{% url 'usuarios_list' %}" class="btn btn-outline-secondary">Cancelar</a>
              <button type="submit" class="btn btn-danger">
                <i class="bi bi-trash me-1"></i>Sí, eliminar
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

</div>
{% endblock %}
